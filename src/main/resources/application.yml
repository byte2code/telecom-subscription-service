spring:
  application:
    name: user-service

server:
  port: 8080

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,hystrix.stream
  endpoint:
    health:
      show-details: always
  health:
    hystrix:
      enabled: true
    circuitbreakers:
      enabled: true

hystrix:
  dashboard:
    enabled: true
    proxy-stream-allow-list: "*"
  command:
    default:
      circuitBreaker:
        requestVolumeThreshold: 5
        errorThresholdPercentage: 50
        sleepWindowInMilliseconds: 5000
      execution:
        isolation:
          thread:
            timeoutInMilliseconds: 2000
